# AWS CLI v2 installation
- name: Install unzip
  apt:
    name: unzip
    state: present

- name: Download AWS CLI v2
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip

- name: Unzip AWS CLI
  shell: unzip -o /tmp/awscliv2.zip -d /tmp/
  args:
    creates: /tmp/aws

- name: Install AWS CLI
  command: /tmp/aws/install --update
  args:
    creates: /usr/local/bin/aws

- name: Verify AWS CLI installation
  command: aws --version
  register: aws_version
  changed_when: false

- name: Print AWS CLI version
  debug:
    msg: "{{ aws_version.stdout }}"

# kubectl installation
- name: Get latest kubectl version
  uri:
    url: https://dl.k8s.io/release/stable.txt
    return_content: yes
  register: kubectl_version

- name: Download kubectl
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version.content | trim }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'

- name: Verify kubectl installation
  command: kubectl version --client
  register: kubectl_ver
  changed_when: false

- name: Print kubectl version
  debug:
    msg: "{{ kubectl_ver.stdout }}"